name: Ransomware Monitor Daily Update

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 9:00 JST (= 0:00 UTC)
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run ransomware monitor
        run: python ransomware/jp_ransomware_monitor.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ransomware/
          git diff --staged --quiet || git commit -m "chore: update ransomware monitor $(date +'%Y-%m-%d')"
          git push
