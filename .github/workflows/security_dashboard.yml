name: Security Dashboard Daily Update

on:
  schedule:
    - cron: '15 0 * * *'  # 毎日 9:15 JST (= 0:15 UTC) ※ransomwareと時間をずらす
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run security monitor
        run: python security-dashboard/jp_security_monitor.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add security-dashboard/index.html security-dashboard/jp_security_seen.json
          git diff --staged --quiet || git commit -m "chore: update security-dashboard $(date +'%Y-%m-%d')"
          git push
